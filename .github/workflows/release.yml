name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Used for archive naming and version sync.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version (tag without v prefix)
        id: ver
        run: |
          tag="${{ steps.tag.outputs.name }}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # CI gate: build + test before producing any artifacts.
      - run: dotnet restore mssql-mcp.sln
      - run: dotnet build mssql-mcp.sln --no-restore
      - run: dotnet test mssql-mcp.sln --no-build --filter Category!=Integration

      # Self-contained single-file builds for Unix RIDs (managed SNI, MIT-clean per ADR-0002).
      - name: Build linux-x64
        run: dotnet publish src/mssql-mcp -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o artifacts/linux-x64
      - name: Build linux-arm64
        run: dotnet publish src/mssql-mcp -c Release -r linux-arm64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o artifacts/linux-arm64
      - name: Build osx-x64
        run: dotnet publish src/mssql-mcp -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o artifacts/osx-x64
      - name: Build osx-arm64
        run: dotnet publish src/mssql-mcp -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o artifacts/osx-arm64
      # Framework-dependent for Windows (SNI license blocks self-contained per ADR-0002).
      - name: Build win-x64 (framework-dependent)
        run: dotnet publish src/mssql-mcp -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o artifacts/win-x64

      # Flat archives: binary at archive root per sqz contract (ADR-0002).
      - name: Archive Unix RIDs
        run: |
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64; do
            (cd artifacts/$rid && tar -czf ../mssql-mcp-${{ steps.tag.outputs.name }}-$rid.tar.gz *)
          done
      - name: Archive Windows RID
        run: cd artifacts/win-x64 && zip -r ../mssql-mcp-${{ steps.tag.outputs.name }}-win-x64.zip *

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          for f in mssql-mcp-*.tar.gz mssql-mcp-*.zip; do
            sha256sum "$f" > "$f.sha256"
          done

      # GitHub Release FIRST so install.js can fetch archives before npm publish lands.
      # Conventional Commits auto-notes (titles enforced by semantic.yml from #16).
      - name: Create GitHub Release
        run: gh release create ${{ steps.tag.outputs.name }} --generate-notes --title ${{ steps.tag.outputs.name }} artifacts/mssql-mcp-*.tar.gz artifacts/mssql-mcp-*.zip artifacts/mssql-mcp-*.sha256 || gh release upload ${{ steps.tag.outputs.name }} artifacts/mssql-mcp-*.tar.gz artifacts/mssql-mcp-*.zip artifacts/mssql-mcp-*.sha256 --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      # Attest GitHub Release archives + checksums BEFORE registry pushes so attestation
      # failure aborts the release. NOT the .nupkg — NuGet.org re-signs packages on
      # ingestion, breaking the SHA (NuGetGallery#10026, see ADR-0019).
      - name: Attest GitHub Release artifacts
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            artifacts/mssql-mcp-*.tar.gz
            artifacts/mssql-mcp-*.zip
            artifacts/mssql-mcp-*.sha256

      # Sync NuGet version to the tag (like npm — prevents VersionPrefix drift).
      # The .csproj's <VersionPrefix> is a floor; the tag is the source of truth.
      - name: Sync NuGet version
        run: |
          version="${{ steps.ver.outputs.version }}"
          sed -i "s|<VersionPrefix>[^<]*</VersionPrefix>|<VersionPrefix>${version}</VersionPrefix>|" src/mssql-mcp/mssql-mcp.csproj
          echo "Synced VersionPrefix to ${version}"
          grep VersionPrefix src/mssql-mcp/mssql-mcp.csproj

      # NuGet pack + Trusted Publishing push (OIDC, no long-lived API key; see ADR-0019).
      - name: Pack NuGet
        run: dotnet pack src/mssql-mcp -c Release -o artifacts
      - name: NuGet Trusted Publishing login
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ secrets.NUGET_USERNAME }}
      - name: Push NuGet
        run: dotnet nuget push "artifacts/codegiveness.mssql-mcp.*.nupkg" --skip-duplicate --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      # Sync npm version to the tag, then publish all 6 packages sequentially
      # (5 per-platform first, main last) with provenance (ADR-0028 §7).
      # Fail-fast: if any per-platform publish fails, the main package is not published.
      - name: Sync npm version
        run: node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('npm/package.json')); p.version='${{ steps.ver.outputs.version }}'; fs.writeFileSync('npm/package.json', JSON.stringify(p,null,2)+'\n')"

      - name: Publish per-platform npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          tag="${{ steps.tag.outputs.name }}"
          version="${{ steps.ver.outputs.version }}"
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64; do
            echo "=== Publishing @codegiveness/mssql-mcp-$rid ==="
            pkg_dir="npm/platforms/$rid"
            # Sync version into the per-platform package.json.
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('$pkg_dir/package.json')); p.version='$version'; fs.writeFileSync('$pkg_dir/package.json', JSON.stringify(p,null,2)+'\n')"
            # Extract the archive into the package dir (binary at root).
            ext="tar.gz"
            [ "$rid" = "win-x64" ] && ext="zip"
            archive="artifacts/mssql-mcp-${tag}-${rid}.${ext}"
            if [ "$ext" = "zip" ]; then
              unzip -o "$archive" -d "$pkg_dir"
            else
              tar -xzf "$archive" -C "$pkg_dir"
            fi
            # Publish from the per-platform package dir.
            (cd "$pkg_dir" && npm publish --provenance --access public)
          done

      - name: Publish main npm package (@codegiveness/mssql-mcp)
        run: cd npm && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  smoke:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Build self-contained binary (linux-x64)
        run: dotnet publish src/mssql-mcp -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o smoke

      - name: Verify --version exits 0
        run: ./smoke/mssql-mcp --version

      - name: Start Azure SQL Edge
        run: |
          docker run -d \
            -e "ACCEPT_EULA=1" \
            -e "MSSQL_SA_PASSWORD=YourStrong!Passw0rd" \
            -p 1433:1433 --name mssql-edge \
            mcr.microsoft.com/azure-sql-edge:latest

      - name: Wait for SQL Server to be ready
        run: |
          for i in $(seq 1 60); do
            if docker exec mssql-edge bash -c 'echo > /dev/tcp/localhost/1433' 2>/dev/null; then
              echo "SQL Server port is open"
              # Give it a moment to finish recovery
              sleep 3
              echo "SQL Server is ready"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i/60)"
            sleep 2
          done
          echo "SQL Server did not start in time"
          docker logs mssql-edge
          exit 1

      - name: Verify --validate exits 0
        run: ./smoke/mssql-mcp --validate
        env:
          MSSQL_CONNECTION_STRING: "Server=localhost;User Id=sa;Password=YourStrong!Passw0rd;Encrypt=True;TrustServerCertificate=True;"
