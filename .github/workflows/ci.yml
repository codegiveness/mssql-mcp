name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore mssql-mcp.sln
      - run: dotnet build mssql-mcp.sln --no-restore
      - run: dotnet format mssql-mcp.sln --verify-no-changes --no-restore
      - run: dotnet test mssql-mcp.sln --no-build --filter Category!=Integration
      - name: Lint README JSON snippets
        run: node scripts/lint-readme-snippets.js
      - name: Pack
        run: dotnet pack src/mssql-mcp/mssql-mcp.csproj -c Release -o artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nupkg
          path: artifacts/*.nupkg

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Build self-contained binary (linux-x64)
        run: dotnet publish src/mssql-mcp -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o smoke

      - name: Verify --version exits 0
        run: ./smoke/mssql-mcp --version

      - name: Start Azure SQL Edge
        run: |
          docker run -d \
            -e "ACCEPT_EULA=1" \
            -e "MSSQL_SA_PASSWORD=YourStrong!Passw0rd" \
            -p 1433:1433 --name mssql-edge \
            mcr.microsoft.com/azure-sql-edge:latest

      - name: Wait for SQL Server to be ready
        run: |
          for i in $(seq 1 60); do
            if docker exec mssql-edge bash -c 'echo > /dev/tcp/localhost/1433' 2>/dev/null; then
              echo "SQL Server port is open"
              # Give it a moment to finish recovery
              sleep 3
              echo "SQL Server is ready"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i/60)"
            sleep 2
          done
          echo "SQL Server did not start in time"
          docker logs mssql-edge
          exit 1

      - name: Verify --validate exits 0
        run: ./smoke/mssql-mcp --validate
        env:
          MSSQL_CONNECTION_STRING: "Server=localhost;User Id=sa;Password=YourStrong!Passw0rd;Encrypt=True;TrustServerCertificate=True;"

  npm-pack:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      # Postinstall-independent install test (ADR-0028):
      # Build a real linux-x64 binary, stage it into the per-platform package,
      # npm pack the main + per-platform packages, then npm install
      # --ignore-scripts in a temp dir. The shim must resolve the optional dep
      # and exec the binary. This proves the install works without postinstall.
      - name: Build self-contained binary (linux-x64)
        run: dotnet publish src/mssql-mcp -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o smoke

      - name: Stage binary into per-platform package
        run: cp smoke/mssql-mcp npm/platforms/linux-x64/mssql-mcp && chmod 755 npm/platforms/linux-x64/mssql-mcp

      - name: Run shim smoke tests
        run: node npm/test.js

      - name: npm pack main + per-platform packages
        run: |
          (cd npm/platforms/linux-x64 && npm pack)
          (cd npm && npm pack)

      - name: Verify --ignore-scripts install resolves optional dep and runs --version
        run: |
          mkdir -p /tmp/install-test
          cp npm/platforms/linux-x64/*.tgz /tmp/install-test/
          cp npm/*.tgz /tmp/install-test/
          cd /tmp/install-test
          npm install --ignore-scripts ./*.tgz
          npx mssql-mcp --version

      - name: Verify --no-optional + MSSQL_MCP_NO_DOWNLOAD=1 prints actionable error
        run: |
          mkdir -p /tmp/no-optional-test
          cp npm/*.tgz /tmp/no-optional-test/
          cd /tmp/no-optional-test
          npm install --ignore-scripts --no-optional ./*.tgz
          output=$(MSSQL_MCP_NO_DOWNLOAD=1 npx mssql-mcp --version 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "github.com/codegiveness/mssql-mcp/releases/download/"
          echo "$output" | grep -q "dotnet tool install -g mssql-mcp"
          echo "Error message contract verified."

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-packs
          path: npm/*.tgz
